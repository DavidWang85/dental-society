<title>中華牙醫學會 學術大會</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-primary: #2563c7;
    --blue-light: #dbeafe;
    --blue-soft: #eff6ff;
    --blue-dark: #1e3a6e;
    --blue-mid: #3b82f6;
    --green-soft: #d1fae5;
    --green-icon: #10b981;
    --gray-bg: #f5f7fa;
    --gray-border: #e5e7eb;
    --gray-text: #6b7280;
    --text-main: #1e293b;
    --white: #ffffff;
    --purple-soft: #ede9fe;
    --purple-icon: #7c3aed;
    --orange-soft: #fff7ed;
    --orange-icon: #f97316;
    --radius: 16px;
    --radius-sm: 12px;
    --shadow: 0 2px 12px rgba(37, 99, 199, 0.08);
  }

  body {
    font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: var(--gray-bg);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* App shell */
  .app-shell {
    max-width: 430px;
    margin: 0 auto;
    background: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-btn {
    width: 44px; height: 44px;
    border: 1.5px solid var(--gray-border);
    background: var(--white);
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .header-btn:hover { background: var(--blue-soft); }
  .header-btn svg { width: 20px; height: 20px; color: var(--text-main); }

  .header-title { text-align: center; }
  .header-title h1 { font-size: 19px; font-weight: 700; color: var(--blue-dark); letter-spacing: .5px; }
  .header-title p  { font-size: 13px; color: var(--gray-text); margin-top: 1px; }

  /* ── Scroll area ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

    border-radius: var(--radius);
    padding: 20px 20px 20px;
    position: relative;
    overflow: hidden;
    min-height: 210px;
  }

  .hero-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.45) 0%, rgba(0,20,60,0.35) 100%);
    pointer-events: none;
    border-radius: var(--radius);
  }

  /* Taipei 101 silhouette */
  .hero-deco {
    position: absolute;
    right: 30px; bottom: 0;
    width: 130px; height: 190px;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    gap: 6px;
  }

  .tooth-svg {
    position: absolute;
    right: 0; bottom: 0;
    width: 130px; height: 180px;
  }

  .badge-next {
    display: inline-flex;
    align-items: center;
    background: var(--blue-primary);
    color: var(--white);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
    letter-spacing: .3px;
  }

  .hero-title {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 10px;
    max-width: 60%;
  }

  .hero-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 13.5px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .hero-meta span { display: flex; align-items: center; gap: 5px; }

  .hero-countdown {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 16px;
  }

  .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn-primary {
    background: var(--blue-primary);
    color: var(--white);
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: background .2s, transform .1s;
  }
  .btn-primary:hover { background: #1d4faa; transform: translateY(-1px); }

  .btn-outline {
    background: var(--white);
    color: var(--blue-primary);
    border: 1.5px solid var(--blue-primary);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: background .2s, transform .1s;
  }
  .btn-outline:hover { background: var(--blue-soft); transform: translateY(-1px); }

  /* ── Quick actions ── */
  .quick-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .quick-card {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: 1.5px solid var(--gray-border);
    transition: border-color .2s, box-shadow .2s;
    text-decoration: none;
    color: inherit;
  }
  .quick-card:hover { border-color: var(--blue-mid); box-shadow: var(--shadow); }

  .quick-card.green-bg { background: #f0fdf4; border-color: #d1fae5; }
  .quick-card.blue-bg  { background: #f5f9ff; border-color: #dbeafe; }

  .quick-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 24px;
  }

  .quick-icon.green { background: var(--green-soft); }
  .quick-icon.blue  { background: var(--blue-light); }

  .quick-label h3 { font-size: 14.5px; font-weight: 700; color: var(--text-main); }
  .quick-label p  { font-size: 12px; color: var(--gray-text); margin-top: 2px; }

  .quick-arrow { margin-left: auto; color: var(--gray-text); font-size: 18px; }

  /* ── Feature grid ── */
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .feature-card {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 18px 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border: 1.5px solid var(--gray-border);
    transition: border-color .2s, box-shadow .2s;
    text-align: center;
    text-decoration: none;
    color: inherit;
  }
  .feature-card:hover { border-color: var(--blue-mid); box-shadow: var(--shadow); }

  .feature-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .feature-icon.blue-i   { background: #f0f7ff; }
  .feature-icon.teal-i   { background: #f0fdf8; }
  .feature-icon.purple-i { background: #f8f5ff; }
  .feature-icon.lblue-i  { background: #f0f7ff; }
  .feature-icon.orange-i { background: #fff9f5; }
  .feature-icon.sky-i    { background: #f0f9ff; }

  .feature-label h3 { font-size: 13.5px; font-weight: 700; color: var(--text-main); }
  .feature-label p  { font-size: 11px; color: var(--gray-text); margin-top: 2px; }

  /* ── AI Assistant banner ── */
  .assistant-banner {
    background: var(--blue-soft);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1.5px solid #bfdbfe;
  }

  .assistant-avatar {
    width: 72px; height: 72px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .assistant-avatar img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(37,99,199,0.15));
  }

  .assistant-info { flex: 1; }
  .assistant-info h3 { font-size: 16px; font-weight: 700; color: var(--blue-primary); }
  .assistant-info p  { font-size: 12.5px; color: #4b6bae; margin-top: 3px; }

  .btn-try {
    background: var(--white);
    color: var(--blue-primary);
    border: 1.5px solid var(--blue-primary);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
  }
  .btn-try:hover { background: var(--blue-light); }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: sticky;
    bottom: 0;
    background: var(--white);
    border-top: 1px solid var(--gray-border);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 4px;
    border-radius: 10px;
    transition: background .15s;
    text-decoration: none;
    color: var(--gray-text);
  }
  .nav-item:hover { background: var(--blue-soft); }
  .nav-item.active { color: var(--blue-primary); }

  .nav-item svg { width: 24px; height: 24px; }
  .nav-label { font-size: 11px; font-weight: 500; }

  /* ── Carousel ── */
  .carousel {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    background: #dbeafe;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.4s ease;
  }

  .carousel-slide {
    min-width: 100%;
  }

  .carousel-slide img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .carousel-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background .2s, transform .2s;
  }

  .dot.active {
    background: #fff;
    transform: scale(1.3);
  }

  /* ── Marquee ── */
  .marquee-wrap {
    overflow: hidden;
    background: #1e3a6e;
    border-radius: 10px;
    padding: 9px 0;
  }

  .marquee-track {
    display: flex;
    white-space: nowrap;
    animation: marquee 10s linear infinite;
  }

  .marquee-track span {
    font-size: 13.5px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: .3px;
    flex-shrink: 0;
  }

  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  @media (min-width: 640px) {
    body { background: #e8edf5; }

    .app-shell {
      max-width: 480px;
      margin: 20px auto;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(30, 58, 110, 0.18);
      min-height: auto;
    }

    .scroll-area { padding-bottom: 24px; }
    .hero-title { font-size: 26px; }
  }

  @media (min-width: 900px) {
    body { padding: 40px 20px; }
    .app-shell { max-width: 420px; }
  }

  /* Divider label */
  .section-divider {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--gray-text); font-weight: 500;
    margin-bottom: -4px;
  }
  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-border); }
</style>
</head>

<script>
  (function () {
    const track  = document.getElementById('carouselTrack');
    const dots   = document.querySelectorAll('.dot');
    const total  = dots.length;

    // 在頭尾各插一個 clone（無限循環用）
    const slides = Array.from(track.children);
    const first  = slides[0].cloneNode(true);
    const last   = slides[total - 1].cloneNode(true);
    track.appendChild(first);
    track.insertBefore(last, slides[0]);

    // 初始位置從 index 1 開始（跳過最前面的 clone）
    let current = 1; // 真實 index = current - 1
    let isTransitioning = false;
    let timer;

    function setPos(idx, animate) {
      track.style.transition = animate ? 'transform 0.4s ease' : 'none';
      track.style.transform  = `translateX(-${idx * 100}%)`;
    }

    function updateDots(realIdx) {
      dots.forEach((d, i) => d.classList.toggle('active', i === realIdx));
    }

    // 切換到真實第 realIdx 張（0-based）
    function goTo(realIdx) {
      if (isTransitioning) return;
      isTransitioning = true;
      current = realIdx + 1; // +1 因為前面插了一個 clone
      setPos(current, true);
      updateDots(realIdx);
    }

    // 動畫結束後處理無限循環的跳位
    track.addEventListener('transitionend', () => {
      isTransitioning = false;
      if (current === 0) {
        // 跳到真實最後一張（無動畫）
        current = total;
        setPos(current, false);
      } else if (current === total + 1) {
        // 跳到真實第一張（無動畫）
        current = 1;
        setPos(current, false);
      }
    });

    function next() {
      if (isTransitioning) return;
      isTransitioning = true;
      current++;
      setPos(current, true);
      // 更新 dot（current - 1 是真實 index，但要處理 clone 邊界）
      const realIdx = current === total + 1 ? 0 : current - 1;
      updateDots(realIdx);
    }

    dots.forEach((d, i) => d.addEventListener('click', () => {
      goTo(i);
      resetTimer();
    }));

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(next, 3000);
    }

    // 滑動手勢
    let startX = 0;
    const el = document.getElementById('carousel');
    el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    el.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) {
        if (diff > 0) next();
        else {
          if (isTransitioning) return;
          isTransitioning = true;
          current--;
          setPos(current, true);
          const realIdx = current === 0 ? total - 1 : current - 1;
          updateDots(realIdx);
        }
        resetTimer();
      }
    });

    // 初始化
    setPos(current, false);
    updateDots(0);
    resetTimer();
  })();
</script>
